<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | IdeaSync</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-gray-900 via-gray-800 to-black flex items-center justify-center min-h-screen">

<!-- CARD -->
<div class="bg-gray-900/80 backdrop-blur-lg p-8 rounded-2xl shadow-2xl w-full max-w-md border border-gray-800">

    <!-- HEADER -->
    <h2 class="text-3xl font-bold text-center text-blue-400">
        Welcome Back 👋
    </h2>
    <p class="text-gray-400 text-center mt-2">
        Login to continue building ideas
    </p>

    <!-- FORM -->
    <div class="mt-6 space-y-4">

        <input id="email"
            class="w-full p-3 rounded-lg bg-gray-800 text-white border border-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="Email address">

        <!-- PASSWORD -->
        <div class="relative">
            <input id="password" type="password"
                class="w-full p-3 rounded-lg bg-gray-800 text-white border border-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500"
                placeholder="Password">

            <button type="button" onclick="togglePassword()"
                class="absolute right-3 top-3 text-gray-400 text-sm">
                Show
            </button>
        </div>

        <!-- LOGIN BUTTON -->
        <button onclick="login()"
            class="w-full bg-blue-500 hover:bg-blue-600 transition p-3 rounded-lg font-semibold text-white">
            Login
        </button>

    </div>

    <!-- FOOTER -->
    <p class="text-gray-400 text-sm text-center mt-6">
        Don’t have an account?
        <a href="register.html" class="text-blue-400 hover:underline">Register</a>
    </p>

</div>

<!-- FIREBASE LOGIC -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// LOGIN
window.login = async function () {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if (!email || !password) {
        alert("Please fill all fields");
        return;
    }

    try {
        await signInWithEmailAndPassword(auth, email, password);
        alert("Login Successful 🚀");
        window.location.href = "dashboard.html";
    } catch (err) {
        alert(err.message);
    }
};

// PASSWORD TOGGLE
window.togglePassword = function () {
    const pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
};
</script>

</body>
</html>
