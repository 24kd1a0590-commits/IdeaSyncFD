<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | IdeaSync</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-gray-900 via-gray-800 to-black flex items-center justify-center min-h-screen">

<!-- CARD -->
<div class="bg-gray-900 p-8 rounded-2xl shadow-2xl w-full max-w-md">

    <!-- TITLE -->
    <h2 class="text-3xl font-bold text-center text-blue-400 mb-6">
        Create Account 🚀
    </h2>

    <!-- FORM -->
    <div class="space-y-4">

        <input id="email"
            class="w-full p-3 rounded-lg bg-gray-800 text-white border border-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="Email">

        <input id="password" type="password"
            class="w-full p-3 rounded-lg bg-gray-800 text-white border border-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="Password">

        <button onclick="register()"
            class="w-full bg-blue-500 hover:bg-blue-600 transition p-3 rounded-lg font-semibold text-white">
            Register
        </button>

    </div>

    <!-- FOOTER -->
    <p class="text-gray-400 text-sm text-center mt-6">
        Already have an account?
        <a href="login.html" class="text-blue-400 hover:underline">Login</a>
    </p>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDf_QmGlx6OrOCVv84our2ipdJVgDEFGlw",
  authDomain: "ideasync-4748d.firebaseapp.com",
  projectId: "ideasync-4748d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.register = function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (!email || !password) {
    alert("Please fill all fields");
    return;
  }

  createUserWithEmailAndPassword(auth, email, password)
    .then(() => {
      alert("Registered Successfully 🎉");
      window.location.href = "onboarding.html";
    })
    .catch(err => alert(err.message));
};
</script>

</body>
</html>
